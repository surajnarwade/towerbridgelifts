name: Scrape Tower Bridge Lifts

on:
  schedule:
    - cron: '0 6 * * 1' # Every 6 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run scraper
        run: go run main.go

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.json
          git commit -m "Update lift times [skip ci]" || echo "No changes to commit"
          git push
